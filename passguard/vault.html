<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PassGuard — Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="topbar">
  <a href="vault.html" class="topbar-logo">Pass<span>Guard</span></a>
  <div class="topbar-nav">
    <a href="vault.html" class="active">🔑 Vault</a>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="login.html" class="danger">🔒 Lock</a>
  </div>
</nav>

<div class="page-body">

  <div class="page-header">
    <h2>My Vault <span class="page-sub">— 0 credentials</span></h2>
    <a href="add.html" class="btn btn-primary btn-sm">+ Add Credential</a>
  </div>

  <div class="search-row">
    <input type="search" placeholder="🔍  Search credentials…" />
    <select>
      <option value="">All categories</option>
      <option>Social</option>
      <option>Work</option>
      <option>Finance</option>
      <option>Other</option>
    </select>
  </div>

  <div class="section-card">
    <table class="cred-table">
      <thead>
        <tr>
          <th>Site</th>
          <th>Username</th>
          <th>Password</th>
          <th>Strength</th>
          <th>Category</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>

        <tr>
          <td colspan="6" style="text-align:center; padding:48px; color:var(--muted);">
            🔑 No credentials yet. <a href="add.html" style="color:var(--accent);">Add your first one →</a>
          </td>
        </tr>

      </tbody>
    </table>
  </div>

</div>

<script src="js/main.js"></script>
</body>
</html>
