<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PassGuard — Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-mark">🔐</div>
      <h1>Pass<span>Guard</span></h1>
      <p>Create your secure vault</p>
    </div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Choose a username" />
    </div>

    <div class="field">
      <label for="password">Master Password</label>
      <div class="input-icon-wrap">
        <input type="password" id="password" placeholder="Create a strong master password" />
        <span class="input-action">👁</span>
      </div>
      <div class="strength-bar">
        <div class="strength-fill" id="strength-fill" style="width:0%;"></div>
      </div>
      <div id="strength-label" style="font-size:11px; color:var(--muted); margin-top:4px;">
        Enter a password to see its strength
      </div>
    </div>

    <div class="field">
      <label for="confirm">Confirm Master Password</label>
      <div class="input-icon-wrap">
        <input type="password" id="confirm" placeholder="Repeat master password" />
        <span class="input-action">👁</span>
      </div>
    </div>

    <div class="warning-box">
      ⚠️ Your master password cannot be recovered if lost. Store it somewhere safe.
    </div>

    <a href="vault.html" class="btn btn-primary btn-block">Create My Vault →</a>

    <div class="auth-divider">Already have an account?</div>
    <a href="login.html" class="btn btn-secondary btn-block">Sign In</a>

  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
