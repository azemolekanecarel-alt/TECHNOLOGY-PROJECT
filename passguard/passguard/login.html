<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PassGuard — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-mark">🔐</div>
      <h1>Pass<span>Guard</span></h1>
      <p>Your secure password vault</p>
    </div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" />
    </div>

    <div class="field">
      <label for="password">Master Password</label>
      <div class="input-icon-wrap">
        <input type="password" id="password" name="password" placeholder="••••••••••••" />
        <span class="input-action">👁</span>
      </div>
    </div>

    <a href="vault.html" class="btn btn-primary btn-block" style="margin-top:4px;">
      Unlock Vault →
    </a>

    <div class="auth-divider">Don't have an account?</div>
    <a href="signup.html" class="btn btn-secondary btn-block">Create Account</a>

  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
