<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PassGuard — Add Credential</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="topbar">
  <a href="vault.html" class="topbar-logo">Pass<span>Guard</span></a>
  <div class="topbar-nav">
    <a href="vault.html" class="active">🔑 Vault</a>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="login.html" class="danger">🔒 Lock</a>
  </div>
</nav>

<div class="page-body">

  <div class="page-header">
    <h2>Add Credential</h2>
    <a href="vault.html" class="btn btn-secondary btn-sm">← Back to Vault</a>
  </div>

  <div class="form-card">

    <div class="field">
      <label for="site_name">Site Name</label>
      <input type="text" id="site_name" placeholder="e.g. GitHub" />
    </div>

    <div class="field">
      <label for="site_url">Website URL</label>
      <input type="url" id="site_url" placeholder="https://github.com" />
    </div>

    <div class="field">
      <label for="username">Username / Email</label>
      <input type="text" id="username" placeholder="Your login username or email" />
    </div>

    <div class="field">
      <label for="category">Category</label>
      <select id="category">
        <option value="">Select a category…</option>
        <option>Social</option>
        <option>Work</option>
        <option>Finance</option>
        <option>Other</option>
      </select>
    </div>

    <!-- Password generator — JS will power this in Week 2 -->
    <div class="generator-box">
      <h4>🎲 Password Generator</h4>
      <div class="gen-output" id="gen-output">
        X7#mPqL@2vNk!9sR
      </div>
      <div class="gen-options">
        <label class="checkbox-label">
          <input type="checkbox" id="gen-upper" checked /> Uppercase
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="gen-lower" checked /> Lowercase
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="gen-numbers" checked /> Numbers
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="gen-symbols" checked /> Symbols
        </label>
      </div>
      <div class="gen-length-row">
        <label>Length: <strong id="gen-length-display">16</strong></label>
        <input type="range" id="gen-length" min="8" max="64" value="16" />
        <button type="button" class="btn btn-primary btn-sm">↻ Generate</button>
        <button type="button" class="btn btn-secondary btn-sm">Use this →</button>
      </div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-icon-wrap">
        <input type="password" id="password" placeholder="Or type your own password" />
        <span class="input-action">👁</span>
      </div>
      <div class="strength-bar">
        <div class="strength-fill" id="strength-fill" style="width:0%;"></div>
      </div>
      <div style="display:flex; justify-content:space-between; margin-top:4px;">
        <span id="strength-label" style="font-size:11px; color:var(--muted);">Enter a password</span>
        <span id="strength-score" style="font-size:11px; color:var(--muted);"></span>
      </div>
    </div>

    <div class="field">
      <label for="notes">Notes (optional)</label>
      <textarea id="notes" rows="3" style="resize:vertical;" placeholder="Any extra info…"></textarea>
    </div>

    <div style="display:flex; gap:12px; margin-top:8px;">
      <a href="vault.html" class="btn btn-primary" style="flex:1;">Save Credential</a>
      <a href="vault.html" class="btn btn-secondary">Cancel</a>
    </div>

  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
